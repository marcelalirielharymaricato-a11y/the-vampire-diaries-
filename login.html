<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>the vampire diaries</title>
</head>
<!-- Fundo da página em Preto -->
<body bgcolor="#1A1A1A">

    <!-- Tabela principal para centralizar tudo na tela -->
    <table border="0" width="100%" height="100%" cellpadding="0" cellspacing="0" style="height: 100vh;">
        <tr>
            <td align="center" valign="middle">
                
                <!-- Card de Login (Branco com borda superior vermelha simulada) -->
                <table border="0" width="320" bgcolor="#FFFFFF" cellpadding="30" cellspacing="0" style="border-top: 5px solid #CC0000;">
                    <tr>
                        <td align="center">
                            <h1><font face="Arial" color="#1A1A1A">login de usuario </font></h1>
                            
                            <form action="principal.html">
                                <p align="left">
                                    <font face="Arial" size="2"><b>Email:</b></font><br>
                                    <input type="email" style="width: 100%; padding: 8px;" required>
                                </p>
                                
                                <p align="left">
                                    <font face="Arial" size="2"><b>Senha:</b></font><br>
                                    <input type="password" style="width: 100%; padding: 8px;" required>
                                </p>
                                
                                <br>
                                
                                <!-- Botão de Entrar em Vermelho -->
                                <button type="submit" style="width: 100%; padding: 10px; background-color: #CC0000; color: white; border: none; font-weight: bold; cursor: pointer;">
                                    ENTRAR
                                </button>
                            </form>
                            
                            <br>
                            <hr color="#EEEEEE">
                            
                            <p>
                                <font face="Arial" size="2" color="#666666">Ainda não tem conta?</font>
                            </p>
                            
                            <!-- Botão de Cadastro em Preto -->
                            <a href="cadastro.html">
                                <button type="button" style="width: 100%; padding: 10px; background-color: #1A1A1A; color: white; border: none; font-weight: bold; cursor: pointer;">
                                    CADASTRAR
                                </button>
                            </a>
                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

</body>
</html>
